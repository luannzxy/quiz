<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>RespiraLab</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="game">

    <h1>🫁 Sistema Respiratorio</h1>

    <div class="hud">
      <p>Nível: <span id="level">1</span></p>
      <p>XP: <span id="xp">0</span>/5</p>
    </div>

    <div class="progress-bar">
      <div class="progress" id="progress"></div>
    </div>

    <p id="question" class="main-message">
      🚀 Clique em começar para iniciar.
    </p>

    <div id="answers" class="answers"></div>

    <button id="startBtn">Começar</button>

  </div>

  <script src="script.js"></script>
</body>
</html>
